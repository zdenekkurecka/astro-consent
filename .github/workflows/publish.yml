name: Publish @zdenekkurecka/astro-consent

# Changesets-driven release pipeline for @zdenekkurecka/astro-consent.
#
# Flow:
#   1. Contributors add a changeset (`pnpm changeset`) describing their change.
#   2. On push to `main`, this workflow runs `changesets/action`:
#        - if there are unreleased changesets, it opens/updates a
#          "Version Packages" PR that bumps versions and updates CHANGELOG.md
#        - if there are no unreleased changesets (i.e. the Version PR was just
#          merged), it runs the `release` script which builds the package and
#          publishes to npm via `changeset publish`.
#
# Publishing uses npm Trusted Publishing (OIDC). No long-lived credentials are
# stored anywhere. At publish time, GitHub issues a short-lived OIDC token, the
# npm CLI exchanges it for a one-shot registry credential, and the tarball is
# published with a provenance attestation ("Built and signed on GitHub Actions").
#
# ─── One-time setup on npmjs.com ─────────────────────────────────────────
#
# https://www.npmjs.com/package/@zdenekkurecka/astro-consent/access
#   → "Trusted Publisher" → "Add trusted publisher" → GitHub Actions
#
#   Organization or user:  zdenekkurecka
#   Repository:            astro-consent
#   Workflow filename:     publish.yml        ← must match this file
#   Environment:           (leave empty)
#
# No repo secrets are needed for npm. `GITHUB_TOKEN` is provided automatically
# and is used by changesets/action to open/update the Version Packages PR.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create tags / GitHub Releases, push version bump PR
  pull-requests: write   # open/update the "Version Packages" PR
  id-token: write        # OIDC token for npm Trusted Publishing

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to compute the release notes
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, required for Trusted Publishing +
          # provenance. See prior publish.yml history for the rationale.
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint published package shape (publint)
        working-directory: packages/astro-consent
        run: |
          pnpm --filter @zdenekkurecka/astro-consent build
          pnpm dlx publint@latest

      - name: Smoke-test integration via playground build
        run: pnpm --filter playground build

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          # We create tags + GitHub Releases ourselves in the next step so the
          # naming matches the legacy `astro-consent-vX.Y.Z` style instead of
          # the monorepo-default `@zdenekkurecka/astro-consent@X.Y.Z`.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Reconcile tags and GitHub Releases
        # Always runs so a rerun can recover from a transient failure in any
        # of the substeps below, even when changesets-action reports nothing
        # new published (e.g. the npm publish already succeeded last time).
        # Each operation is idempotent — missing artefacts are created, and
        # everything else is a no-op.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          git fetch --tags origin

          # Prefer the list of packages changesets just published. Fall back
          # to the workspace package.json so a rerun (where published=false)
          # can still reconcile missing tags/releases against npm.
          if [ -n "${PUBLISHED_PACKAGES:-}" ] && [ "$PUBLISHED_PACKAGES" != "[]" ]; then
            packages="$PUBLISHED_PACKAGES"
          else
            packages=$(jq -c '{name: .name, version: .version}' packages/astro-consent/package.json | jq -sc '.')
          fi

          echo "$packages" | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            short="${name##*/}"
            new_tag="${short}-v${version}"
            old_tag="${name}@${version}"

            # Only reconcile versions actually on npm. Avoids creating tags
            # for a version bump whose publish step failed.
            #
            # `changeset publish` reports success as soon as npm accepts the
            # write, but the public registry read path has propagation lag
            # (observed ~5-30s). Retry before declaring it unpublished so we
            # don't flakily skip tag + release creation right after a fresh
            # publish. A truly failed publish will still miss every attempt
            # and fall through to `continue`, preserving the original guard.
            published=""
            for attempt in 1 2 3 4 5 6; do
              if npm view "${name}@${version}" version >/dev/null 2>&1; then
                published=1
                break
              fi
              echo "npm view ${name}@${version} not visible yet (attempt ${attempt}/6) — retrying in 10s"
              sleep 10
            done
            if [ -z "$published" ]; then
              echo "Skip ${name}@${version}: not published to npm yet"
              continue
            fi

            # --- tag ---
            if git ls-remote --exit-code --tags origin "refs/tags/${new_tag}" >/dev/null 2>&1; then
              echo "Tag ${new_tag} already on origin — skip"
            else
              # Point the new tag at whichever ref exists locally: the scoped
              # tag pushed by changesets-action, or HEAD as a last resort.
              if git rev-parse --verify "refs/tags/${old_tag}" >/dev/null 2>&1; then
                git tag -f "${new_tag}" "${old_tag}"
              else
                git tag -f "${new_tag}" HEAD
              fi
              # Retry transient push failures (e.g. GitHub 5xx).
              for attempt in 1 2 3 4 5; do
                if git push origin "refs/tags/${new_tag}"; then
                  break
                fi
                if [ "$attempt" = 5 ]; then
                  echo "Failed to push ${new_tag} after 5 attempts" >&2
                  exit 1
                fi
                sleep $((attempt * 5))
              done
            fi

            # Remove the scoped tag from origin if it's still there.
            git push origin ":refs/tags/${old_tag}" || true

            # --- release ---
            if gh release view "${new_tag}" >/dev/null 2>&1; then
              echo "Release ${new_tag} already exists — skip"
            else
              notes=$(awk -v ver="$version" '
                $0 == "## " ver { inblock = 1; next }
                inblock && /^## / { exit }
                inblock { print }
              ' "packages/${short}/CHANGELOG.md")
              gh release create "${new_tag}" \
                --title "${new_tag}" \
                --notes "$notes"
            fi
          done
