name: Publish @zdenekkurecka/astro-consent

# Changesets-driven release pipeline for @zdenekkurecka/astro-consent.
#
# Flow:
#   1. Contributors add a changeset (`pnpm changeset`) describing their change.
#   2. On push to `main`, this workflow runs `changesets/action`:
#        - if there are unreleased changesets, it opens/updates a
#          "Version Packages" PR that bumps versions and updates CHANGELOG.md
#        - if there are no unreleased changesets (i.e. the Version PR was just
#          merged), it runs the `release` script which builds the package and
#          publishes to npm via `changeset publish`.
#
# Publishing uses npm Trusted Publishing (OIDC). No long-lived credentials are
# stored anywhere. At publish time, GitHub issues a short-lived OIDC token, the
# npm CLI exchanges it for a one-shot registry credential, and the tarball is
# published with a provenance attestation ("Built and signed on GitHub Actions").
#
# ─── One-time setup on npmjs.com ─────────────────────────────────────────
#
# https://www.npmjs.com/package/@zdenekkurecka/astro-consent/access
#   → "Trusted Publisher" → "Add trusted publisher" → GitHub Actions
#
#   Organization or user:  zdenekkurecka
#   Repository:            astro-consent
#   Workflow filename:     publish.yml        ← must match this file
#   Environment:           (leave empty)
#
# No repo secrets are needed for npm. `GITHUB_TOKEN` is provided automatically
# and is used by changesets/action to open/update the Version Packages PR.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create tags / GitHub Releases, push version bump PR
  pull-requests: write   # open/update the "Version Packages" PR
  id-token: write        # OIDC token for npm Trusted Publishing

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # changesets needs full history to compute the release notes
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x, required for Trusted Publishing +
          # provenance. See prior publish.yml history for the rationale.
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint published package shape (publint)
        working-directory: packages/astro-consent
        run: |
          pnpm --filter @zdenekkurecka/astro-consent build
          pnpm dlx publint@latest

      - name: Smoke-test integration via playground build
        run: pnpm --filter playground build

      - name: Create Release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
          # We create tags + GitHub Releases ourselves in the next step so the
          # naming matches the legacy `astro-consent-vX.Y.Z` style instead of
          # the monorepo-default `@zdenekkurecka/astro-consent@X.Y.Z`.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Rename tags and create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          # changesets-action pushed the default `@scope/name@version` tags
          # to origin, but they may not be present in this checkout's local
          # refs. Fetch them so `git tag <new> <old>` can resolve <old>.
          git fetch --tags origin
          echo "$PUBLISHED_PACKAGES" | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            short="${name##*/}"
            new_tag="${short}-v${version}"
            old_tag="${name}@${version}"

            echo "Renaming $old_tag → $new_tag"

            # Create the pretty tag on the same commit and push it.
            git tag "$new_tag" "$old_tag"
            git push origin "refs/tags/$new_tag"

            # Remove the ugly tag from origin (local copy is ephemeral).
            git push origin ":refs/tags/$old_tag" || true

            # Extract just this version's section from the package CHANGELOG.
            notes=$(awk -v ver="$version" '
              $0 == "## " ver { inblock = 1; next }
              inblock && /^## / { exit }
              inblock { print }
            ' "packages/${short}/CHANGELOG.md")

            gh release create "$new_tag" \
              --title "$new_tag" \
              --notes "$notes"
          done
